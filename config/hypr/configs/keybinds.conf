# ── @ ; Keybindings ────────────────────────────────────────────

$mainMod = SUPER # Sets "Windows" key as main modifier

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Applications

	bind = $mainMod, Return, exec, $terminal
	bind = $mainMod, E, exec, $fileManager
	bind = $mainMod, SPACE, exec, $menu
	bind = $mainMod, B, exec, $browser
	bind = $mainMod, A, exec, $message
	
	bind = $mainMod, Q, killactive,
	bind = $mainMod, M, exec, wlogout
	bind = $mainMod, L, exec, hyprlock
	bind = $mainMod, J, togglesplit, # dwindle
	bind = $mainMod, V, togglefloating,
	bind = ALT, 1, exec, spotify

	bind = CTRL ALT, S, exec, grim -g "$(slurp)" - | wl-copy
	bind = $mainMod, W, exec, ~/.scripts/wallpick.sh
	bind = $mainMod ALT, W, exec, ~/.scripts/wallpicker.sh
	bind = $mainMod ALT, A, exec, ~/.scripts/animation.switcher.sh
	bind = $mainMod, T, exec, ~/.scripts/theme.switcher.sh
	bind = $mainMod, H, exec, ~/.scripts/configs.sh
	bind = $mainMod CTRL, C, exec, ~/.scripts/toggle.blur.sh
	bind = $mainMod, C, exec, swaync-client -t
	bind = $mainMod, F, exec, ~/.scripts/toggle.waybar.sh

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Workspaces

	bind = $mainMod, left, movefocus, l
	bind = $mainMod, right, movefocus, r
	bind = $mainMod, up, movefocus, u
	bind = $mainMod, down, movefocus, d

	bind = $mainMod, 1, workspace, 1
	bind = $mainMod, 2, workspace, 2
	bind = $mainMod, 3, workspace, 3
	bind = $mainMod, 4, workspace, 4
	bind = $mainMod, 5, workspace, 5
	bind = $mainMod, 6, workspace, 6
	bind = $mainMod, 7, workspace, 7
	bind = $mainMod, 8, workspace, 8
	bind = $mainMod, 9, workspace, 9
	bind = $mainMod, 0, workspace, 10

#  ─────────────────────────────────────────────────────────────────────────────

# @ ; Move Workspaces

	bind = $mainMod SHIFT, 1, movetoworkspace, 1
	bind = $mainMod SHIFT, 2, movetoworkspace, 2
	bind = $mainMod SHIFT, 3, movetoworkspace, 3
	bind = $mainMod SHIFT, 4, movetoworkspace, 4
	bind = $mainMod SHIFT, 5, movetoworkspace, 5
	bind = $mainMod SHIFT, 6, movetoworkspace, 6
	bind = $mainMod SHIFT, 7, movetoworkspace, 7
	bind = $mainMod SHIFT, 8, movetoworkspace, 8
	bind = $mainMod SHIFT, 9, movetoworkspace, 9
	bind = $mainMod SHIFT, 0, movetoworkspace, 10

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Scratchpads

	bind = $mainMod, S, togglespecialworkspace, magic
	bind = $mainMod SHIFT, S, movetoworkspace, special:magic

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Scroll through existing workspaces

	bind = $mainMod, mouse_down, workspace, e+1
	bind = $mainMod, mouse_up, workspace, e-1

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Move/resize

	bindm = $mainMod, mouse:272, movewindow
	bindm = $mainMod, mouse:273, resizewindow

#  ─────────────────────────────────────────────────────────────────────────────

# @ · Laptop multimedia keys for volume and LCD brightness

# Volume Up
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i audio-volume-high "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100}')%"

# Volume Down
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i audio-volume-low "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100}')%"

# Mute Toggle
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i $([[ $(wpctl get-volume @DEFAULT_AUDIO_SINK@) == *"[MUTED]"* ]] && echo "audio-volume-muted" || echo "audio-volume-high") "Output" "$([[ $(wpctl get-volume @DEFAULT_AUDIO_SINK@) == *"[MUTED]"* ]] && echo "Muted" || echo "Active")"#  ─────────────────────────────────────────────────────────────────────────────

# Mic Mute Toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send -h string:x-canonical-private-synchronous:mic-notify -u low -i $([[ $(wpctl get-volume @DEFAULT_AUDIO_SOURCE@) == *"[MUTED]"* ]] && echo "microphone-sensitivity-muted" || echo "microphone-sensitivity-high") "Microphone" "$([[ $(wpctl get-volume @DEFAULT_AUDIO_SOURCE@) == *"[MUTED]"* ]] && echo "Muted" || echo "Active")"

# Brightness Up
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i display-brightness "Brightness" "$(brightnessctl -m | cut -d, -f4)"

# Brightness Down
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -i display-brightness "Brightness" "$(brightnessctl -m | cut -d, -f4)"

# @ · Requires playerctl

	bindl = , XF86AudioNext, exec, playerctl next
	bindl = , XF86AudioPause, exec, playerctl play-pause
	bindl = , XF86AudioPlay, exec, playerctl play-pause
	bindl = , XF86AudioPrev, exec, playerctl previous

#  ─────────────────────────────────────────────────────────────────────────────
