# 1. LOAD COLORS FIRST (Must be at the very top)
source = /home/foworum/.config/matugen/generated/hyprlock-colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    color = $background  # Uses variable from source
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%H")\n$(date +"%M")"
    color = $primary     # Uses variable from source
    font_size = 90
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 180
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    outer_color = $primary     
    inner_color = $background
    font_color = $foreground
    fail_color = $error     
    # ... rest of config
}
